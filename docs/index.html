      padding: 14px 10px 4px;

      border-left: none;

      color: #777;

      background: #222;

      font-size: 10px;
      color: #555;
      margin-left: 8px;
    }
    #menu-hint {
      color: #444;
      font: 11px monospace;
      margin-top: 12px;
      border-top: 1px solid #222;
      padding-top: 10px;
    }
    #startup-hint {
      position: fixed;

      transform: translateY(60px);
      text-align: center;
      color: #888;
      font: 20px monospace;
      pointer-events: none;
      transition: opacity 0.5s;
    }
  </style>
</head>
